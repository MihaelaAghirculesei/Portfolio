name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  test:
    name: Pre-deploy Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint Angular
        run: npm run lint

      - name: Build Angular
        run: npm run build -- --configuration=production

      - name: Check Worker syntax
        run: node --check cloudflare-worker/email-worker.js

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build -- --configuration=production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/angular-portofolio/browser --project-name=aghirculesei --branch=main
